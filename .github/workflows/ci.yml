name: CI – Build & Test

on:
  pull_request:
    types: [closed]
    branches:
      - develop
      - main
    paths-ignore:
      - '**.md'

jobs:
  prevent-direct-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Prevent direct merge to develop or main
        if: >
          github.event.pull_request.merged == true &&
          (
            (github.event.pull_request.base.ref == 'develop' && !startsWith(github.event.pull_request.head.ref, 'feature/')) ||
            (github.event.pull_request.base.ref == 'main' && !startsWith(github.event.pull_request.head.ref, 'release/'))
          )
        run: |
          echo "Direct merges to develop or main are not allowed."
          exit 1

  build-and-test:
    if: >
      github.event.pull_request.merged == true &&
      (
        (github.event.pull_request.base.ref == 'develop' && startsWith(github.event.pull_request.head.ref, 'feature/')) ||
        (github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'release/'))
      )
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore AdImpactOs.sln
      - name: Build solution
        run: dotnet build AdImpactOs.sln --no-restore --configuration Release
      - name: Run unit tests
        run: |
          dotnet test AdImpactOs.sln \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./test-results \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./coverage/
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/*.trx
          retention-days: 30
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/coverage/*.xml'
          retention-days: 30

jobs:
  build-and-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore AdImpactOs.sln

      - name: Build solution
        run: dotnet build AdImpactOs.sln --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test AdImpactOs.sln \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./test-results \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./coverage/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/*.trx
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/coverage/*.xml'
          retention-days: 30

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose config
        run: docker compose -f docker-compose.yml config --quiet

      - name: Build Docker images (no push)
        run: docker compose -f docker-compose.yml build --parallel
