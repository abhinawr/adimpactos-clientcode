name: CD – Deploy to Azure

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  FUNCTION_APP_NAME: ${{ secrets.AZURE_FUNCTION_APP_NAME }}

# Free org: only one deploy at a time (no environment protection rules available)
concurrency:
  group: cd-dev
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # 0. Branch naming gate (PR merges only)
  # ─────────────────────────────────────────────
  prevent-direct-merge:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce release/* → main convention
        if: >
          github.event.pull_request.merged == true &&
          !startsWith(github.event.pull_request.head.ref, 'release/')
        run: |
          echo "::error::Only release/* branches may be merged to main."
          exit 1

  # ─────────────────────────────────────────────
  # 1. Build & push all Docker images to ACR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'release/')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "version=$(echo $GITHUB_SHA | head -c 8)" >> $GITHUB_OUTPUT

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build and push – Panelist API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/AdImpactOs.PanelistAPI/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/panelistapi:${{ steps.meta.outputs.version }}
            ${{ env.ACR_LOGIN_SERVER }}/panelistapi:latest

      - name: Build and push – Survey API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/AdImpactOs.Survey/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/surveyapi:${{ steps.meta.outputs.version }}
            ${{ env.ACR_LOGIN_SERVER }}/surveyapi:latest

      - name: Build and push – Campaign API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/AdImpactOs.Campaign/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/campaignapi:${{ steps.meta.outputs.version }}
            ${{ env.ACR_LOGIN_SERVER }}/campaignapi:latest

      - name: Build and push – Event Consumer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/AdImpactOs.EventConsumer/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/eventconsumer:${{ steps.meta.outputs.version }}
            ${{ env.ACR_LOGIN_SERVER }}/eventconsumer:latest

      - name: Build and push – Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/AdImpactOs.Dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/dashboard:${{ steps.meta.outputs.version }}
            ${{ env.ACR_LOGIN_SERVER }}/dashboard:latest

      - name: Build and push – Demo UI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/AdImpactOs.DemoUI/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/demoui:${{ steps.meta.outputs.version }}
            ${{ env.ACR_LOGIN_SERVER }}/demoui:latest

  # ─────────────────────────────────────────────
  # 2. Deploy Azure Functions
  # ─────────────────────────────────────────────
  deploy-functions:
    name: Deploy Azure Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-push
    environment: dev
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Azure Functions
        run: |
          dotnet publish src/AdImpactOs/AdImpactOs.csproj \
            --configuration Release \
            --output ./functions-publish

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ./functions-publish

  # ─────────────────────────────────────────────
  # 3. Deploy container-based services to App Service
  # ─────────────────────────────────────────────
  deploy-services:
    name: Deploy Container Services
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-push
    environment: dev

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Panelist API
        run: |
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ secrets.PANELIST_API_APP_NAME }} \
            --container-image-name ${{ env.ACR_LOGIN_SERVER }}/panelistapi:${{ needs.build-and-push.outputs.image-tag }}

      - name: Deploy Survey API
        run: |
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ secrets.SURVEY_API_APP_NAME }} \
            --container-image-name ${{ env.ACR_LOGIN_SERVER }}/surveyapi:${{ needs.build-and-push.outputs.image-tag }}

      - name: Deploy Campaign API
        run: |
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ secrets.CAMPAIGN_API_APP_NAME }} \
            --container-image-name ${{ env.ACR_LOGIN_SERVER }}/campaignapi:${{ needs.build-and-push.outputs.image-tag }}

      - name: Deploy Event Consumer
        run: |
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ secrets.EVENT_CONSUMER_APP_NAME }} \
            --container-image-name ${{ env.ACR_LOGIN_SERVER }}/eventconsumer:${{ needs.build-and-push.outputs.image-tag }}

      - name: Deploy Dashboard
        run: |
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ secrets.DASHBOARD_APP_NAME }} \
            --container-image-name ${{ env.ACR_LOGIN_SERVER }}/dashboard:${{ needs.build-and-push.outputs.image-tag }}

      - name: Deploy Demo UI
        run: |
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ secrets.DEMO_UI_APP_NAME }} \
            --container-image-name ${{ env.ACR_LOGIN_SERVER }}/demoui:${{ needs.build-and-push.outputs.image-tag }}

  # ─────────────────────────────────────────────
  # 4. Post-deployment health check
  # ─────────────────────────────────────────────
  smoke-test:
    name: Post-Deployment Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-functions, deploy-services]
    environment: dev

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Function App is running
        run: |
          state=$(az functionapp show \
            --name ${{ env.FUNCTION_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query state --output tsv)
          echo "Function App state: $state"
          [ "$state" = "Running" ]

      - name: Health-check Panelist API
        run: |
          url=$(az webapp show \
            --name ${{ secrets.PANELIST_API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query defaultHostName --output tsv)
          curl --fail --silent --retry 3 --retry-delay 10 "https://$url/health"

      - name: Health-check Survey API
        run: |
          url=$(az webapp show \
            --name ${{ secrets.SURVEY_API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query defaultHostName --output tsv)
          curl --fail --silent --retry 3 --retry-delay 10 "https://$url/health"

      - name: Health-check Campaign API
        run: |
          url=$(az webapp show \
            --name ${{ secrets.CAMPAIGN_API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query defaultHostName --output tsv)
          curl --fail --silent --retry 3 --retry-delay 10 "https://$url/health"
